<!doctype html>
<meta charset="UTF-8" />
<html lang="en">
    <head>
        <title>democapsid</title>
        <style>
            * {
                font-family: monospace;
            }

            .container {
                display: grid;
                grid-template-columns: 2fr 4fr 4fr 2fr;
                grid-template-rows: 8fr 4fr;
                gap: 5px 5px;
                grid-auto-flow: row;
                grid-template-areas:
                    ". controller model ."
                    ". console console .";
                height: 100vh;
                overflow: hidden;
            }
            .subcontainer1 {
                display: grid;
                grid-template-columns: 4fr 4fr 4fr;
                grid-template-rows: 12fr;
                gap: 5px 5px;
                grid-auto-flow: row;
                grid-template-areas: ". . .";
            }
            .subcontainer2 {
                display: grid;
                grid-template-columns: 6fr 6fr;
                grid-template-rows: 12fr;
                gap: 5px 5px;
                grid-auto-flow: row;
                grid-template-areas: ". .";
            }
            .controller {
                grid-area: controller;
            }
            .console {
                grid-area: console;
            }
            .model {
                grid-area: model;
            }

            fieldset {
                padding: 5px 10px 5px 10px;
                min-height: 0;
                height: 100%;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
            .form-row {
                display: flex;
                align-items: center;
                margin: 5px 0px 5px 0px;
            }
            .form-row label {
                width: 20px;
            }
            .form-row input,
            select {
                flex-grow: 1;
                padding: 5px;
            }

            legend {
                font-weight: bold;
            }
            button,
            label,
            legend,
            fieldset,
            input,
            select {
                border-radius: 5px;
                vertical-align: middle;
                box-sizing: border-box;
            }

            .canvas-wrapper {
                position: relative;
                width: 100%;
                height: 100%;
                min-width: 0;
                min-height: 0;
            }
            .canvas-wrapper canvas {
                display: block;
                width: 100%;
                height: 100%;
            }

            .swatch {
                display: grid;
                grid-template-columns: 10fr 2fr;
                grid-template-rows: 12fr;
                gap: 5px 5px;
                grid-auto-flow: row;
                grid-template-areas: ". .";
                margin: 5px 0px 5px 0px;
            }
            .swatch > input {
                width: 100%;
            }
        </style>
        <script type="text/javascript" src="js/lib/chroma/chroma.min.cjs"></script>
        <script type="text/javascript" src="js/lib/paper/paper-core.min.js"></script>
        <script type="text/javascript" src="js/democapsid.js"></script>
        <script type="text/javascript" src="js/graph.js"></script>
        <script type="text/javascript" src="js/sketch.js"></script>
        <script type="text/javascript" src="js/main.js"></script>
    </head>
    <body>
        <div class="container">
            <div class="controller">
                <div class="subcontainer1">
                    <div class="params">
                        <div>
                            <fieldset>
                                <legend>lattice</legend>

                                <div class="form-row">
                                    <label for="param_h">h=</label>
                                    <input type="number" id="param_h" step="1" value="1" min="0" />
                                </div>
                                <div class="form-row">
                                    <label for="param_k">k=</label>
                                    <input type="number" id="param_k" step="1" value="1" min="0" />
                                </div>
                                <div class="form-row">
                                    <label for="param_H">H=</label>
                                    <input type="number" id="param_H" step="1" value="1" min="0" />
                                </div>
                                <div class="form-row">
                                    <label for="param_K">K=</label>
                                    <input type="number" id="param_K" step="1" value="2" min="0" />
                                </div>
                                <div class="form-row">
                                    <label for="param_R">R=</label>
                                    <input type="number" id="param_R" step="1" value="25" min="1" />
                                </div>
                                <div class="form-row">
                                    <label for="param_t">t=</label>
                                    <select id="param_t">
                                        <option value="levo">levo</option>
                                        <option value="dextro">dextro</option>
                                    </select>
                                </div>
                                <div class="form-row">
                                    <label for="param_L">L=</label>
                                    <select id="param_L"></select>
                                </div>
                            </fieldset>
                        </div>
                    </div>
                    <fieldset>
                        <legend>fundamental-&bigtriangleup;</legend>
                        <div class="canvas-wrapper">
                            <canvas id="wythoff">Your browser does not support the HTML canvas tag.</canvas>
                        </div>
                    </fieldset>
                    <fieldset>
                        <legend>kaleidoscope</legend>
                        <div class="canvas-wrapper">
                            <canvas id="kaleidoscope">Your browser does not support the HTML canvas tag.</canvas>
                        </div>
                    </fieldset>
                </div>
                <div class="subcontainer2">
                    <div>
                        <fieldset>
                            <legend>icosahedron</legend>
                            <div class="form-row">
                                <label for="param_a">a=</label>
                                <select id="param_a">
                                    <option value="5">5</option>
                                    <option value="3">3</option>
                                    <option value="2">2</option>
                                </select>
                            </div>
                            <div class="form-row">
                                <label for="param_s">s=</label>
                                <input type="range" min="-1" max="1" step="0.001" , value="0" id="param_s" />
                            </div>
                        </fieldset>
                    </div>
                    <div>
                        <fieldset>
                            <legend>camera</legend>
                            <div class="form-row">
                                <label for="θ">θ=</label>
                                <input type="number" id="param_θ" step="1" value="0" />
                            </div>
                            <div class="form-row">
                                <label for="ψ">ψ=</label>
                                <input type="number" id="param_ψ" step="1" value="0" />
                            </div>
                            <div class="form-row">
                                <label for="φ">φ=</label>
                                <input type="number" id="param_φ" step="1" value="-90" />
                            </div>
                        </fieldset>
                    </div>
                </div>
                <div>
                    <fieldset>
                        <legend>aesthetics</legend>
                        <select id="scale"></select>
                        <div id="palette">
                            <div class="swatch">
                                <input type="color" />
                                <input type="number" min="0" max="255" value="200" />
                            </div>
                            <div class="swatch">
                                <input type="color" />
                                <input type="number" min="0" max="255" value="200" />
                            </div>
                            <div class="swatch">
                                <input type="color" />
                                <input type="number" min="0" max="255" value="200" />
                            </div>
                        </div>
                    </fieldset>
                </div>
                <div>
                    <fieldset>
                        <legend>export</legend>
                        <button id="download-btn">Download SVG</button>
                    </fieldset>
                </div>
            </div>
            <div class="model">
                <div class="canvas-wrapper">
                    <fieldset>
                        <legend>model</legend>
                        <canvas id="model">Your browser does not support the HTML canvas tag.</canvas>
                    </fieldset>
                </div>
            </div>
            <div class="console">
                <fieldset>
                    <legend>console</legend>
                </fieldset>
            </div>
        </div>
    </body>
</html>
