<!doctype html>
<meta charset="UTF-8" />
<html lang="en">
    <head>
        <title>democapsid</title>
        <style>
            * {
                font-family: monospace;
            }

            .container {
                display: grid;
                grid-template-columns: 2fr 2fr 2fr 6fr;
                grid-template-rows: 1.7fr 0.3fr;
                gap: 10px 10px;
                grid-auto-flow: row;
                grid-template-areas:
                    "params triangle kaleidoscope model"
                    "download aesthetics aesthetics console";
            }

            .params {
                grid-area: params;
            }

            .download {
                grid-area: download;
            }

            .triangle {
                grid-area: triangle;
            }

            .kaleidoscope {
                grid-area: kaleidoscope;
            }

            .console {
                grid-area: console;
            }

            .model {
                grid-area: model;
            }

            .aesthetics {
                grid-area: aesthetics;
            }

            .model {
                grid-area: model;
            }

            .console {
                grid-area: console;
            }

            fieldset {
                margin: 0 auto;
                display: block;
            }
            legend {
                font-weight: bold;
            }
            button {
                width: 100%;
            }

            #view0 {
                width: 100%;
                height: 500px;
            }
            #view1 {
                width: 100%;
                height: 500px;
            }
            #view2 {
                width: 100%;
                height: 500px;
            }
        </style>
        <script type="text/javascript" src="js/lib/chroma/chroma.min.cjs"></script>
        <script type="text/javascript" src="js/lib/paper/paper-core.min.js"></script>
        <script type="text/javascript" src="js/democapsid.js"></script>
        <script type="text/javascript" src="js/graph.js"></script>
        <script type="text/javascript" src="js/sketch.js"></script>
        <script type="text/javascript" src="js/main.js"></script>
    </head>
    <body>
        <div class="container">
            <div class="params">
                <fieldset>
                    <legend>lattice</legend>
                    <div>
                        <label for="param_h">h=</label>
                        <input type="number" id="param_h" step="1" value="1" min="0" />
                    </div>
                    <div>
                        <label for="param_k">k=</label>
                        <input type="number" id="param_k" step="1" value="1" min="0" />
                    </div>
                    <div>
                        <label for="param_H">H=</label>
                        <input type="number" id="param_H" step="1" value="1" min="0" />
                    </div>
                    <div>
                        <label for="param_K">K=</label>
                        <input type="number" id="param_K" step="1" value="2" min="0" />
                    </div>
                    <div>
                        <label for="param_t">t=</label>
                        <select id="param_t">
                            <option value="levo">levo</option>
                            <option value="dextro">dextro</option>
                        </select>
                    </div>
                    <div>
                        <label for="param_R">R=</label>
                        <input type="number" id="param_R" step="1" value="25" min="1" />
                    </div>
                    <div>
                        <label for="param_L">L=</label>
                        <select id="param_L">
                            <option value="custom">custom</option>
                            <option value="hex">hex</option>
                            <option value="trihex">trihex</option>
                            <option value="snubhex">snubhex</option>
                            <option value="rhombitrihex">rhombitrihex</option>
                            <option value="dualhex">dualhex</option>
                            <option value="dualtrihex">dualtrihex</option>
                            <option value="dualsnubhex">dualsnubhex</option>
                            <option value="dualrhombitrihex">dualrhombitrihex</option>
                        </select>
                    </div>
                </fieldset>
                <fieldset>
                    <legend>icosahedron</legend>
                    <div>
                        <label for="param_a">a=</label>
                        <select id="param_a">
                            <option value="5">5</option>
                            <option value="3">3</option>
                            <option value="2">2</option>
                        </select>
                    </div>
                    <div>
                        <label for="param_s">s=</label>
                        <input type="range" min="-1" max="1" step="0.001" , value="0" id="param_s" />
                    </div>
                    <div>
                        <label for="θ">θ=</label>
                        <input type="number" id="param_θ" step="10" value="0" />
                    </div>
                    <div>
                        <label for="ψ">ψ=</label>
                        <input type="number" id="param_ψ" step="10" value="0" />
                    </div>
                    <div>
                        <label for="φ">φ=</label>
                        <input type="number" id="param_φ" step="10" value="-90" />
                    </div>
                </fieldset>
                <fieldset>
                    <legend>aesthetics</legend>
                    <label for="param_c">c=</label>
                    <select id="param_c"></select>
                    <div id="pallete"></div>
                </fieldset>
            </div>
            <div class="download">
                <div>
                    <button id="download-btn">Download SVG</button>
                </div>
            </div>
            <div class="triangle">
                <canvas id="view0">Your browser does not support the HTML canvas tag.</canvas>
            </div>
            <div class="kaleidoscope">
                <canvas id="view1">Your browser does not support the HTML canvas tag.</canvas>
            </div>
            <div class="aesthetics"></div>
            <div class="model">
                <canvas id="view2">Your browser does not support the HTML canvas tag.</canvas>
            </div>
            <div class="console"></div>
        </div>
    </body>
</html>
